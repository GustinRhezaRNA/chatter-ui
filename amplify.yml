version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - echo "VITE_REACT_APP_API_URL=$VITE_REACT_APP_API_URL" >> .env
        - echo "VITE_REACT_APP_WS_URL=$VITE_REACT_APP_WS_URL" >> .env
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
customRules:
  - source: </^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|ttf|map|json)$)([^.]+$)/>
    status: '200'
    target: /index.html